kube-prometheus-stack:
  # Grafana — exposed on NodePort 30300
  grafana:
    service:
      type: NodePort
      nodePort: 30300
    persistence:
      enabled: true
      storageClassName: local-path
      size: 2Gi
    # initChownData disabled: local-path PVs don't allow the chown init container to run.
    # fsGroup 472 (grafana uid) ensures the kernel sets correct group ownership at mount time.
    initChownData:
      enabled: false
    securityContext:
      runAsUser: 472
      runAsGroup: 472
      fsGroup: 472
    # Retrieve admin password: kubectl get secret -n monitoring kube-prometheus-stack-grafana -o jsonpath='{.data.admin-password}' | base64 -d

  # Prometheus — NodePort 30900 for direct PromQL access
  prometheus:
    service:
      type: NodePort
      nodePort: 30900
    prometheusSpec:
      retention: 30d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi

  # Alertmanager — config loaded from k8s Secret (webhook URL kept out of Git)
  # Secret 'alertmanager-main' in namespace 'monitoring' holds alertmanager.yaml
  # To update: kubectl edit secret alertmanager-main -n monitoring, then rollout restart
  alertmanager:
    alertmanagerSpec:
      configSecret: alertmanager-main
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 1Gi

  # node-exporter runs as a DaemonSet — picks up host metrics automatically
  prometheus-node-exporter:
    enabled: true
