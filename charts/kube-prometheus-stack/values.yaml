kube-prometheus-stack:
  # Grafana — exposed on NodePort 30300
  grafana:
    service:
      type: NodePort
      nodePort: 30300
    persistence:
      enabled: true
      storageClassName: local-path
      size: 2Gi
    # initChownData disabled: local-path PVs don't allow the chown init container to run.
    # fsGroup 472 (grafana uid) ensures the kernel sets correct group ownership at mount time.
    initChownData:
      enabled: false
    securityContext:
      runAsUser: 472
      runAsGroup: 472
      fsGroup: 472
    # Retrieve admin password: kubectl get secret -n monitoring kube-prometheus-stack-grafana -o jsonpath='{.data.admin-password}' | base64 -d

  # Prometheus — NodePort 30900 for direct PromQL access
  prometheus:
    service:
      type: NodePort
      nodePort: 30900
    prometheusSpec:
      retention: 30d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi
      additionalScrapeConfigs:
        - job_name: node-exporter-external
          static_configs:
            - targets: ['192.168.0.201:9100']
              labels: {hostname: JBNAS01, role: nas}
            - targets: ['192.168.0.203:9100']
              labels: {hostname: JBVM02, role: claude-code}
            - targets: ['192.168.0.204:9100']
              labels: {hostname: JBVM03, role: minecraft}
            - targets: ['192.168.0.206:9100']
              labels: {hostname: JBVM01, role: jumpbox}
          relabel_configs:
            - source_labels: [__address__]
              regex: '([^:]+):.*'
              target_label: instance
              replacement: '$1'
        - job_name: proxmox
          metrics_path: /pve
          params:
            module: [default]
          static_configs:
            - targets:
                - 192.168.0.200
              labels:
                hostname: JBSRV01
                role: proxmox
          relabel_configs:
            - source_labels: [__address__]
              target_label: __param_target
            - source_labels: [__param_target]
              target_label: instance
            - target_label: __address__
              replacement: pve-exporter.monitoring.svc.cluster.local:9221

  # Alertmanager — config loaded from k8s Secret (webhook URL kept out of Git)
  # Secret 'alertmanager-main' in namespace 'monitoring' holds alertmanager.yaml
  # To update: kubectl edit secret alertmanager-main -n monitoring, then rollout restart
  alertmanager:
    alertmanagerSpec:
      configSecret: alertmanager-main
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 1Gi

  # node-exporter runs as a DaemonSet — picks up host metrics automatically
  prometheus-node-exporter:
    enabled: true

  # k3s embeds these components — they don't expose standard metrics ports.
  # Disable to prevent false-positive "Down" alerts.
  kubeScheduler:
    enabled: false
  kubeControllerManager:
    enabled: false
  kubeProxy:
    enabled: false
