# Self-healing password sync for Grafana.
# Each kube-prometheus-stack chart upgrade regenerates the admin-password
# Secret via a Helm hook, but the Grafana SQLite DB on the PV retains the
# previous password — they desync, and login fails with 401 until someone
# runs the manual reset recipe. This Job runs as an ArgoCD PostSync hook
# after every sync, reading the (newly regenerated) Secret and resetting
# the in-DB password to match. The reset is idempotent, so running it on
# syncs that didn't change the chart version is harmless.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-password-sync
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: grafana-password-sync
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["kube-prometheus-stack-grafana"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["kube-prometheus-stack-grafana"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grafana-password-sync
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: grafana-password-sync
subjects:
  - kind: ServiceAccount
    name: grafana-password-sync
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: grafana-password-sync
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: grafana-password-sync
      restartPolicy: OnFailure
      containers:
        - name: kubectl
          image: rancher/kubectl:v1.35.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              echo "Reading admin password from Secret..."
              PW=$(kubectl get secret kube-prometheus-stack-grafana \
                -n {{ .Release.Namespace }} \
                -o jsonpath='{.data.admin-password}' | base64 -d)
              echo "Resetting Grafana DB password to match Secret..."
              kubectl exec -n {{ .Release.Namespace }} \
                deployment/kube-prometheus-stack-grafana -c grafana -- \
                grafana cli admin reset-admin-password "${PW}"
              echo "Done. Admin password in DB now matches Secret."
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
