promtail:
  config:
    clients:
      - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push

  # ServiceMonitor: gets promtail into `up{job="promtail"}` so the
  # PromtailDown alert (kube-prometheus-stack/values.yaml → logging-stack-
  # health) fires when a node's journal stops shipping to Loki. Force the
  # job label to plain "promtail" to match the alert query (same pattern as
  # charts/pihole-exporter/servicemonitor.yaml).
  serviceMonitor:
    enabled: true
    labels:
      release: kube-prometheus-stack
    relabelings:
      - targetLabel: job
        replacement: promtail
