apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-capacity-backup-dr
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  capacity-backup-dr.json: |
    {
      "title": "Capacity, Growth & Backup/DR",
      "uid": "capacity-backup-dr",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "Europe/London",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Filesystem Free Space (%) \u2014 across all hosts",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 2,
          "title": "Free %",
          "type": "bargauge",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 1,
            "w": 24,
            "h": 10
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "valueMode": "color"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "mappings": [],
              "thresholds": {
                "mode": "percentage",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 70
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "100 * node_filesystem_avail_bytes{fstype!~\"tmpfs|overlay|squashfs|devtmpfs|fuse.*|ramfs|autofs|nsfs|tracefs|securityfs|cgroup.*|bpf|debugfs|configfs|hugetlbfs|mqueue|pstore|sysfs|proc|none\",mountpoint!~\"/var/lib/kubelet.*|/var/lib/docker.*|/run.*|/snap.*|/boot/efi\"} / node_filesystem_size_bytes{fstype!~\"tmpfs|overlay|squashfs|devtmpfs|fuse.*|ramfs|autofs|nsfs|tracefs|securityfs|cgroup.*|bpf|debugfs|configfs|hugetlbfs|mqueue|pstore|sysfs|proc|none\",mountpoint!~\"/var/lib/kubelet.*|/var/lib/docker.*|/run.*|/snap.*|/boot/efi\"}",
              "legendFormat": "{{hostname}}: {{mountpoint}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Filesystem Days-to-Full (linear projection from last 7d)",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 11,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 4,
          "title": "Days remaining (positive = filling; absent = stable/growing slowly)",
          "type": "bargauge",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 12,
            "w": 24,
            "h": 8
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "valueMode": "color"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "d",
              "min": 0,
              "max": 180,
              "mappings": [],
              "thresholds": {
                "mode": "percentage",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 70
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "(node_filesystem_avail_bytes{fstype!~\"tmpfs|overlay|squashfs|devtmpfs|fuse.*|ramfs|autofs|nsfs|tracefs|securityfs|cgroup.*|bpf|debugfs|configfs|hugetlbfs|mqueue|pstore|sysfs|proc|none\",mountpoint!~\"/var/lib/kubelet.*|/var/lib/docker.*|/run.*|/snap.*|/boot/efi\"} /  (-deriv(node_filesystem_avail_bytes{fstype!~\"tmpfs|overlay|squashfs|devtmpfs|fuse.*|ramfs|autofs|nsfs|tracefs|securityfs|cgroup.*|bpf|debugfs|configfs|hugetlbfs|mqueue|pstore|sysfs|proc|none\",mountpoint!~\"/var/lib/kubelet.*|/var/lib/docker.*|/run.*|/snap.*|/boot/efi\"}[7d]) > 0) ) / 86400",
              "legendFormat": "{{hostname}}: {{mountpoint}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "ZFS Pools (NAS)",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 20,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 6,
          "title": "JBNAS_SSD pool state",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 21,
            "w": 6,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_zfs_zpool_state{hostname=\"JBNAS01\", zpool=\"JBNAS_SSD\", state=\"online\"}",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "title": "JBNAS_MEDIA pool state",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 6,
            "y": 21,
            "w": 6,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_zfs_zpool_state{hostname=\"JBNAS01\", zpool=\"JBNAS_MEDIA\", state=\"online\"}",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "title": "ARC hit ratio",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 12,
            "y": 21,
            "w": 6,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 70
                  },
                  {
                    "color": "green",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_zfs_arc_hits{hostname=\"JBNAS01\"} / (node_zfs_arc_hits{hostname=\"JBNAS01\"} + node_zfs_arc_misses{hostname=\"JBNAS01\"}) * 100",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 9,
          "title": "ARC size",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 18,
            "y": 21,
            "w": 6,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_zfs_arc_size{hostname=\"JBNAS01\"}",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 10,
          "title": "Estate Headroom \u2014 RAM & CPU per Host",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 25,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 11,
          "title": "Free memory (%)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 26,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "100 * avg by (hostname) (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)",
              "legendFormat": "{{hostname}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 12,
          "title": "CPU idle (%)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 12,
            "y": 26,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "100 * avg by (hostname) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))",
              "legendFormat": "{{hostname}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 13,
          "title": "SMART \u2014 Power-on time + warnings (JBSRV01 = all physical drives)",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 34,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 14,
          "title": "Power-on hours per drive",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 35,
            "w": 16,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "h",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "smartctl_device_power_on_seconds{instance=\"192.168.0.200\"} / 3600",
              "legendFormat": "{{device}} {{model_name}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 15,
          "title": "Drives with SMART warning (exit_status > 0)",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 16,
            "y": 35,
            "w": 8,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "count(smartctl_device_smartctl_exit_status{instance=\"192.168.0.200\"} > 0) or vector(0)",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 16,
          "title": "Drives with SMART status FAILED",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 16,
            "y": 39,
            "w": 8,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "count(smartctl_device_smart_status{instance=\"192.168.0.200\"} == 0) or vector(0)",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 17,
          "title": "Backup / DR Status",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 43,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 18,
          "title": "Open gaps",
          "type": "text",
          "gridPos": {
            "x": 0,
            "y": 44,
            "w": 24,
            "h": 9
          },
          "options": {
            "mode": "markdown",
            "content": "\n### Open backup / DR gaps (from `project_open_defects`)\n\n- **JBSRV01** has no scheduled config backup. Loss of `/etc/pve` is reconstructable but slow.\n- **JBDNS01** has no backup at all. Pi-hole rebuild is doc-driven; gravity list, custom DNS, DHCP leases all rebuild from code.\n- **JBNAS_MEDIA** is a stripe pool (no parity, no snapshots). Single HDD failure loses 5 TB of Plex library.\n- **`data` pool** rsync targets back up project data, but `_inbox`, `mc-backups`, and `system-state` are single-copy.\n- **JBVM01 credential store** is single-copy on local disk.\n\nThese are tracked in `project_open_defects.md` (memory). When a textfile-collector\nbackup-status pipeline lands, the panels above this one will populate with\nlast-success timestamps and replace this static list.\n"
          }
        }
      ],
      "links": []
    }
