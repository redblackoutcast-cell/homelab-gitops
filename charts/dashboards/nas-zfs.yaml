apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-nas-zfs
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  nas-zfs.json: |
    {
      "title": "NAS \u2014 ZFS Pools & ARC",
      "uid": "nas-zfs",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "Europe/London",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "ZFS Pool Health",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 2,
          "title": "JBNAS_SSD",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 1,
            "w": 6,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_zfs_zpool_state{hostname=\"JBNAS01\", zpool=\"JBNAS_SSD\", state=\"online\"}",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "JBNAS_MEDIA",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 6,
            "y": 1,
            "w": 6,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_zfs_zpool_state{hostname=\"JBNAS01\", zpool=\"JBNAS_MEDIA\", state=\"online\"}",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "ARC Hit Ratio",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 12,
            "y": 1,
            "w": 6,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 70
                  },
                  {
                    "color": "green",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_zfs_arc_hits{hostname=\"JBNAS01\"} / (node_zfs_arc_hits{hostname=\"JBNAS01\"} + node_zfs_arc_misses{hostname=\"JBNAS01\"}) * 100",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "ARC Size",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 18,
            "y": 1,
            "w": 6,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_zfs_arc_size{hostname=\"JBNAS01\"}",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "ZFS ARC Detail",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 5,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 7,
          "title": "ARC Utilisation",
          "type": "gauge",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 6,
            "w": 8,
            "h": 8
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "mappings": [],
              "thresholds": {
                "mode": "percentage",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 70
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_zfs_arc_size{hostname=\"JBNAS01\"} / node_zfs_arc_c_max{hostname=\"JBNAS01\"} * 100",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "title": "ARC Size vs Max",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 8,
            "y": 6,
            "w": 16,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_zfs_arc_size{hostname=\"JBNAS01\"}",
              "legendFormat": "ARC Used",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_zfs_arc_c_max{hostname=\"JBNAS01\"}",
              "legendFormat": "ARC Max",
              "refId": "B"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_zfs_arc_c_min{hostname=\"JBNAS01\"}",
              "legendFormat": "ARC Min",
              "refId": "C"
            }
          ]
        },
        {
          "id": 9,
          "title": "ARC Hit/Miss Rate",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 14,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 10,
          "title": "ARC Demand Hits / Misses",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 15,
            "w": 24,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "rate(node_zfs_arc_demand_data_hits{hostname=\"JBNAS01\"}[5m])",
              "legendFormat": "Data Hits",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "rate(node_zfs_arc_demand_data_misses{hostname=\"JBNAS01\"}[5m])",
              "legendFormat": "Data Misses",
              "refId": "B"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "rate(node_zfs_arc_demand_metadata_hits{hostname=\"JBNAS01\"}[5m])",
              "legendFormat": "Meta Hits",
              "refId": "C"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "rate(node_zfs_arc_demand_metadata_misses{hostname=\"JBNAS01\"}[5m])",
              "legendFormat": "Meta Misses",
              "refId": "D"
            }
          ]
        },
        {
          "id": 11,
          "title": "NAS Host Resources",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 23,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 12,
          "title": "NAS CPU %",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 24,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{instance=\"192.168.0.201\",mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "CPU %",
              "refId": "A"
            }
          ]
        },
        {
          "id": 13,
          "title": "NAS Memory",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 12,
            "y": 24,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_memory_MemTotal_bytes{instance=\"192.168.0.201\"} - node_memory_MemAvailable_bytes{instance=\"192.168.0.201\"}",
              "legendFormat": "Used",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_memory_MemTotal_bytes{instance=\"192.168.0.201\"}",
              "legendFormat": "Total",
              "refId": "B"
            }
          ]
        }
      ],
      "links": []
    }
