apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-logs-network-dns
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  logs-network-dns.json: |
    {
      "title": "Logs + Network/DNS Overview",
      "uid": "logs-network-dns",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "Europe/London",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Loki \u2014 Log Activity (last 5m)",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 2,
          "title": "Log rate per host (lines/sec)",
          "type": "timeseries",
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": {
            "x": 0,
            "y": 1,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "expr": "sum by (hostname) (rate({job=\"systemd-journal\"}[5m]))",
              "legendFormat": "{{hostname}}",
              "refId": "A",
              "queryType": "range"
            }
          ]
        },
        {
          "id": 3,
          "title": "Error rate per host (lines/sec)",
          "type": "timeseries",
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": {
            "x": 12,
            "y": 1,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
