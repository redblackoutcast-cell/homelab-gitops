            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "expr": "sum by (hostname) (rate({job=\"systemd-journal\"} |~ \"(?i)error\"[5m]))",
              "legendFormat": "{{hostname}}",
              "refId": "A",
              "queryType": "range"
            }
          ]
        },
        {
          "id": 4,
